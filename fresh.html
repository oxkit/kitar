<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FRESH - Futures Research, Execution &amp; Strategy Hub</title>
<link rel="icon" type="image/png" href="fresh/assets/fresh-glyph-v2.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#06080b;
    --bg-2:#0a0e14;
    --bg-3:#0e131b;
    --line:rgba(255,255,255,.09);
    --line-2:rgba(255,255,255,.16);
    --tx:#e7ecf2;
    --tx-mut:#8a94a3;
    --tx-dim:#59626f;
    --ok:#33e08a;
    --ok-dim:rgba(51,224,138,.16);
    --warn:#f5b13d;
    --warn-dim:rgba(245,177,61,.16);
    --bad:#ff5e57;
    --accent:var(--ok);
    --accent-dim:var(--ok-dim);
    --max:1180px;
    --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:"Space Grotesk",ui-sans-serif,system-ui,sans-serif;
  }
  /* accent modes */
  [data-accent="green"]{--accent:var(--ok);--accent-dim:var(--ok-dim);}
  [data-accent="amber"]{--accent:var(--warn);--accent-dim:var(--warn-dim);}
  [data-accent="both"]{--accent:var(--ok);--accent-dim:var(--ok-dim);}

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;background:var(--bg);color:var(--tx);
    font-family:var(--sans);font-size:17px;line-height:1.55;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  /* faint grid / scanline texture for terminal feel */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(ellipse 120% 90% at 50% 0%,#000 30%,transparent 80%);
  }
  ::selection{background:rgba(51,224,138,.28);color:#fff;}
  a{color:inherit;text-decoration:none;}
  h1,h2,h3,h4{margin:0;font-weight:600;letter-spacing:-.02em;line-height:1.05;}
  p{margin:0;}
  .mono{font-family:var(--mono);}
  .tnum{font-variant-numeric:tabular-nums;}

  #root{position:relative;z-index:1;}

  /* shared utility classes used across component files */
  .wrap{max-width:var(--max);margin:0 auto;padding:0 32px;}
  .kicker{
    font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.16em;
    text-transform:uppercase;color:var(--accent);display:inline-flex;align-items:center;gap:9px;
  }
  .kicker .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 10px var(--accent);}
  .sec{position:relative;padding:120px 0;border-top:1px solid var(--line);}
  .sec-eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx-dim);}

  /* blinking cursor */
  .cursor{display:inline-block;width:.62em;height:1.02em;background:var(--accent);
    margin-left:.12em;vertical-align:-2px;}
  body.motion-on .cursor{animation:blink 1.05s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}

  /* status dot */
  .sdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;display:inline-block;}
  .sdot.ok{background:var(--ok);box-shadow:0 0 9px var(--ok);}
  .sdot.warn{background:var(--warn);box-shadow:0 0 9px var(--warn);}
  .sdot.bad{background:var(--bad);box-shadow:0 0 9px var(--bad);}
  .sdot.idle{background:var(--tx-dim);}
  body.motion-on .sdot.live{animation:pulse 1.8s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  /* scroll reveal */
  .reveal{opacity:0;transform:translateY(18px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.7,.3,1);}
  .reveal.in{opacity:1;transform:none;}
  body:not(.motion-on) .reveal{opacity:1;transform:none;transition:none;}

  button{font-family:inherit;}
  .btn{
    font-family:var(--mono);font-size:13.5px;font-weight:500;letter-spacing:.02em;
    display:inline-flex;align-items:center;gap:10px;cursor:pointer;
    padding:14px 22px;border-radius:8px;border:1px solid transparent;transition:.18s ease;
  }
  .btn-primary{background:var(--accent);color:#04140c;border-color:var(--accent);}
  .btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);
    box-shadow:0 8px 30px -8px var(--accent);}
  [data-accent="amber"] .btn-primary{color:#1a1204;}
  .btn-ghost{background:transparent;color:var(--tx);border-color:var(--line-2);}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}

  /* disabled / "soon" state */
  .btn.is-soon,.btn:disabled{background:var(--bg-3);color:var(--tx-dim);
    border-color:var(--line);cursor:not-allowed;box-shadow:none;transform:none;filter:none;
    gap:8px;}
  .btn.is-soon:hover,.btn:disabled:hover{background:var(--bg-3);color:var(--tx-dim);
    border-color:var(--line);box-shadow:none;transform:none;filter:none;}
  .btn.is-soon .soon-dot{width:6px;height:6px;border-radius:50%;background:var(--tx-dim);}

  /* generic panel */
  .panel{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;}

  @media (max-width:860px){
    body{font-size:16px;}
    .wrap{padding:0 22px;}
    .sec{padding:84px 0;}
  }
</style>
</head>
<body class="motion-on">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="fresh/components.jsx"></script>
  <script type="text/babel" src="fresh/hero.jsx"></script>
  <script type="text/babel" src="fresh/sections.jsx"></script>
  <script type="text/babel" src="fresh/app.jsx"></script>
</body>
</html>
